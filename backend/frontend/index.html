<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentMatrix - 真实后端测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 24px; }
        .panel-title { font-size: 1.2rem; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #eee; }
        
        .input-area { display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 14px 16px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s; }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area button { padding: 14px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: transform 0.2s; }
        .input-area button:hover { transform: translateY(-2px); }
        .input-area button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .agent-step { display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin-bottom: 8px; border-radius: 8px; background: #f8f9fa; transition: all 0.3s; }
        .agent-step.active { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); border-left: 4px solid #4caf50; }
        .agent-step.completed { background: #e3f2fd; border-left: 4px solid #2196f3; }
        .agent-step.failed { background: #ffebee; border-left: 4px solid #f44336; }
        
        .agent-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .agent-icon.knowledge { background: #ff6b6b; }
        .agent-icon.summary { background: #4ecdc4; }
        .agent-icon.writer { background: #45b7d1; }
        .agent-icon.review { background: #96ceb4; }
        .agent-icon.judge { background: #ffeaa7; color: #333; }
        .agent-icon.result { background: #a29bfe; }
        
        .agent-info { flex: 1; }
        .agent-name { font-weight: 600; color: #333; }
        .agent-status { font-size: 0.85rem; color: #666; margin-top: 2px; }
        .agent-status.running { color: #4caf50; }
        .agent-status.completed { color: #2196f3; }
        .agent-status.pending { color: #9e9e9e; }
        .agent-status.failed { color: #f44336; }
        
        .result-panel { grid-column: span 2; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .result-title { font-size: 1.1rem; font-weight: 600; color: #333; }
        .result-meta { display: flex; gap: 16px; font-size: 0.85rem; color: #666; }
        
        .result-content { background: #f8f9fa; border-radius: 10px; padding: 20px; min-height: 300px; white-space: pre-wrap; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.95rem; line-height: 1.6; color: #333; }
        .result-content:empty::before { content: '等待输入问题...'; color: #999; }
        
        .logs-panel { max-height: 400px; overflow-y: auto; }
        .log-item { padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; }
        .log-item.info { background: #e3f2fd; border-left: 3px solid #2196f3; }
        .log-item.success { background: #e8f5e9; border-left: 3px solid #4caf50; }
        .log-item.warning { background: #fff3e0; border-left: 3px solid #ff9800; }
        .log-item.error { background: #ffebee; border-left: 3px solid #f44336; }
        .log-timestamp { color: #999; font-size: 0.75rem; margin-right: 8px; }
        
        .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .metric-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .metric-value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .metric-label { font-size: 0.9rem; color: #666; }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
        .status-online { background: #e8f5e9; color: #4caf50; }
        .status-offline { background: #ffebee; color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AgentMatrix</h1>
            <p>多智能体动态协同与国产算力优化平台</p>
            <span class="status-badge status-online" id="backend-status">后端已连接</span>
        </div>
        
        <div class="metrics">
            <div class="metric-card"><div class="metric-value" id="metric-agents">6</div><div class="metric-label">活跃 Agent</div></div>
            <div class="metric-card"><div class="metric-value" id="metric-cost">0</div><div class="metric-label">成本节省</div></div>
            <div class="metric-card"><div class="metric-value" id="metric-time">0</div><div class="metric-label">响应时间(ms)</div></div>
            <div class="metric-card"><div class="metric-value" id="metric-calls">0</div><div class="metric-label">API调用次数</div></div>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <div class="panel-title">输入问题</div>
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="请输入您的问题..." />
                    <button id="submit-btn">发送</button>
                </div>
                
                <div class="agent-workflow" id="workflow">
                    <div class="agent-step" data-agent="knowledge"><div class="agent-icon knowledge">K</div><div class="agent-info"><div class="agent-name">Knowledge Agent</div><div class="agent-status pending">等待中</div></div></div>
                    <div class="agent-step" data-agent="summary"><div class="agent-icon summary">S</div><div class="agent-info"><div class="agent-name">Summary Agent</div><div class="agent-status pending">等待中</div></div></div>
                    <div class="agent-step" data-agent="writer"><div class="agent-icon writer">W</div><div class="agent-info"><div class="agent-name">Writer Agent</div><div class="agent-status pending">等待中</div></div></div>
                    <div class="agent-step" data-agent="review"><div class="agent-icon review">R</div><div class="agent-info"><div class="agent-name">Review Agent</div><div class="agent-status pending">等待中</div></div></div>
                    <div class="agent-step" data-agent="judge"><div class="agent-icon judge">J</div><div class="agent-info"><div class="agent-name">Judge Agent</div><div class="agent-status pending">等待中</div></div></div>
                    <div class="agent-step" data-agent="result"><div class="agent-icon result">E</div><div class="agent-info"><div class="agent-name">Result Agent</div><div class="agent-status pending">等待中</div></div></div>
                </div>
            </div>
            
            <div class="panel logs-panel">
                <div class="panel-title">实时日志</div>
                <div id="logs"></div>
            </div>
            
            <div class="panel result-panel">
                <div class="result-header">
                    <div class="result-title">最终结果</div>
                    <div class="result-meta"><span id="result-type">-</span><span id="result-complexity">-</span></div>
                </div>
                <div class="result-content" id="result"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        // 只执行前三个 Agent（knowledge、summary、writer），跳过后面的 review、judge、result
const agents = ['knowledge', 'summary', 'writer'];
        const agentNames = {
            knowledge: 'Knowledge Agent',
            summary: 'Summary Agent',
            writer: 'Writer Agent',
            review: 'Review Agent',
            judge: 'Judge Agent',
            result: 'Result Agent'
        };

        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = `log-item ${type}`;
            logItem.innerHTML = `<span class="log-timestamp">[${timestamp}]</span>${message}`;
            logs.appendChild(logItem);
            logs.scrollTop = logs.scrollHeight;
        }

        function setAgentStatus(agentId, status) {
            const step = document.querySelector(`[data-agent="${agentId}"]`);
            const statusElement = step.querySelector('.agent-status');
            step.classList.remove('active', 'completed', 'failed');
            statusElement.classList.remove('running', 'completed', 'pending', 'failed');
            
            if (status === 'running') {
                step.classList.add('active');
                statusElement.textContent = '执行中...';
                statusElement.classList.add('running');
            } else if (status === 'completed') {
                step.classList.add('completed');
                statusElement.textContent = '已完成';
                statusElement.classList.add('completed');
            } else if (status === 'failed') {
                step.classList.add('failed');
                statusElement.textContent = '失败';
                statusElement.classList.add('failed');
            } else {
                statusElement.textContent = '等待中';
                statusElement.classList.add('pending');
            }
        }

        async function testBackendHealth() {
            try {
                const response = await fetch(`/api/health`);
                if (response.ok) {
                    const data = await response.json();
                    addLog(`后端服务正常 - 版本: ${data.version}`, 'success');
                    document.getElementById('metric-agents').textContent = Object.keys(data.agents).length;
                    return true;
                }
            } catch (error) {
                addLog(`后端连接失败: ${error.message}`, 'error');
                document.getElementById('backend-status').className = 'status-badge status-offline';
                document.getElementById('backend-status').textContent = '后端未连接';
            }
            return false;
        }

        async function executeAgent(agentId, inputData) {
            addLog(`正在执行 ${agentNames[agentId]}...`, 'info');
            addLog(`输入内容: ${inputData.substring(0, 50)}...`, 'info');
            setAgentStatus(agentId, 'running');
            
            try {
                addLog(`发送请求: /api/v1/agents/${agentId}/execute`, 'info');
                const response = await fetch(`/api/v1/agents/${agentId}/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: inputData, use_llm: true })
                });
                
                addLog(`HTTP 状态码: ${response.status}`, 'info');
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                addLog(`${agentNames[agentId]} 执行完成`, 'success');
                const resultPreview = result.content ? result.content.substring(0, 100) + '...' : '空内容';
                addLog(`返回结果: ${resultPreview}`, 'info');
                setAgentStatus(agentId, 'completed');
                
                return result;
            } catch (error) {
                addLog(`${agentNames[agentId]} 执行失败: ${error.message}`, 'error');
                setAgentStatus(agentId, 'failed');
                throw error;
            }
        }

        async function executeWorkflow(userInput) {
            const submitBtn = document.getElementById('submit-btn');
            const input = document.getElementById('user-input');
            
            submitBtn.disabled = true;
            input.disabled = true;
            
            // 重置所有 Agent 状态（包括隐藏的）
            document.querySelectorAll('.agent-step').forEach(step => {
                step.classList.remove('active', 'completed', 'failed');
                const statusElement = step.querySelector('.agent-status');
                statusElement.textContent = '等待中';
                statusElement.className = 'agent-status pending';
            });
            
            document.getElementById('result').textContent = '';
            document.getElementById('result-type').textContent = '-';
            document.getElementById('result-complexity').textContent = '-';
            
            addLog('=== 开始执行 Agent 工作流 ===', 'info');
            addLog(`当前配置的 Agent 列表: ${agents.join(', ')}`, 'info');
            addLog(`用户输入: ${userInput}`, 'info');
            
            const startTime = Date.now();
            let writerResult = '';
            
            try {
                let currentInput = userInput;
                
                for (const agentId of agents) {
                    addLog(`--- 正在执行 ${agentNames[agentId]} ---`, 'info');
                    const result = await executeAgent(agentId, currentInput);
                    
                    if (result.success && result.content) {
                        currentInput = result.content;
                        
                        // 特别记录 Writer Agent 的结果
                        if (agentId === 'writer') {
                            writerResult = result.content;
                            addLog(`✅ Writer Agent 输出长度: ${writerResult.length} 字符`, 'success');
                            addLog(`Writer Agent 输出预览: ${writerResult.substring(0, 150)}...`, 'info');
                        }
                    }
                }
                
                // 直接显示 Writer Agent 的结果
                document.getElementById('result').textContent = writerResult || currentInput;
                document.getElementById('result-type').textContent = '📝 Writer Agent 输出';
                document.getElementById('result-complexity').textContent = `内容长度: ${(writerResult || currentInput).length} 字符`;
                
                document.getElementById('metric-calls').textContent = parseInt(document.getElementById('metric-calls').textContent) + 1;
                
                const duration = Date.now() - startTime;
                document.getElementById('metric-time').textContent = duration;
                
                addLog(`=== 工作流执行完成！总耗时: ${duration}ms ===`, 'success');
                
            } catch (error) {
                addLog(`工作流执行失败: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (text) {
                if (!await testBackendHealth()) {
                    addLog('请确保后端服务已启动', 'warning');
                    return;
                }
                executeWorkflow(text);
            }
        });

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('submit-btn').click();
            }
        });

        // 初始化检查后端状态
        testBackendHealth();
        addLog('系统已就绪，等待用户输入...', 'info');
        document.getElementById('user-input').focus();
    </script>
</body>
</html>
